name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

jobs:
  test-and-build:
    name: Test, Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: valorize_user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: valorize_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          fetch-depth: 0 # Full history for SonarCloud analysis

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run tests with coverage
        run: npm run ci:test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://valorize_user:password@localhost:5432/valorize_test

      - name: Build TypeScript
        run: npm run build:prod

      - name: Debug - List coverage directory
        if: always()
        run: |
          echo "Checking for coverage directory..."
          if [ -d "coverage" ]; then
            echo "✅ Coverage directory exists"
            ls -la coverage/
          else
            echo "❌ Coverage directory not found"
            echo "Current directory contents:"
            ls -la
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage
          path: coverage/
          retention-days: 5
          if-no-files-found: warn

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: test-and-build
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          fetch-depth: 0

      - name: Download coverage artifact
        id: download-coverage
        continue-on-error: true
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: coverage
          path: coverage/

      - name: Check coverage file exists
        id: check-coverage
        run: |
          if [ -f "coverage/lcov.info" ]; then
            echo "✅ Coverage file found"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ Coverage file not found - SonarCloud will run without coverage data"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: SonarCloud Scan
        continue-on-error: true
        uses: SonarSource/sonarcloud-github-action@ffc3010689be73b8e5ae0c57ce35968afd7909e8 # v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}

      - name: Comment PR with SonarCloud results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const fs = require('fs');
            const reportPath = '.scannerwork/report-task.txt';
            if (fs.existsSync(reportPath)) {
              const report = fs.readFileSync(reportPath, 'utf8');
              const dashboardUrl = report.match(/dashboardUrl=(.*)/)?.[1];
              if (dashboardUrl) {
                github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: `📊 [SonarCloud Analysis Results](${dashboardUrl})`
                });
              }
            }

  quality-gate:
    name: Quality Gate Check
    runs-on: ubuntu-latest
    needs: sonarcloud
    if: always()

    steps:
      - name: Check Quality Gate
        run: |
          echo "✅ Quality Gate Check"
          echo "Quality gates can be configured in SonarCloud Dashboard"
          echo "See: docs/ci-cd-setup.md for more information"
