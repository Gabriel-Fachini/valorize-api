# SonarCloud Configuration for Valorize API
# Reference: https://docs.sonarcloud.io/

# Organization and Project Information
sonar.organization=gabriel-fachini
sonar.projectKey=gabriel-fachini_valorize-api
sonar.projectName=Valorize API
sonar.projectVersion=1.0.0

# Source Code Configuration
sonar.sources=src
sonar.sourceEncoding=UTF-8

# Test and Coverage Configuration
sonar.tests=src/tests,src/features
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts,**/__tests__/**

# Coverage Reports (from Vitest)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusions
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/*.test.ts,\
  **/*.spec.ts,\
  **/*.md,\
  src/tests/**,\
  src/lib/seed.ts,\
  src/lib/seed/**,\
  src/lib/voucher-providers/test-*.ts,\
  utility-tests/**,\
  scripts/**,\
  docs/**,\
  memory-bank/**,\
  postman/**,\
  database-steps/**,\
  prisma/migrations/**

# TypeScript Configuration
sonar.typescript.tsconfigPath=tsconfig.json
sonar.typescript.eslint.reportPaths=eslint-report.json

# Duplication
sonar.cpd.exclusions=**/*.test.ts,**/*.spec.ts

# Issue Links (Optional - for GitHub integration)
sonar.links.homepage=https://github.com/Gabriel-Fachini/valorize-api
sonar.links.scm=https://github.com/Gabriel-Fachini/valorize-api
sonar.links.issue_tracker=https://github.com/Gabriel-Fachini/valorize-api/issues

# Quality Gate Configuration
# Note: Quality gates are configured in SonarCloud dashboard
# Default: Sonar way (can be customized)
# Thresholds:
#   - Coverage: > 70%
#   - Duplications: < 3%
#   - Maintainability: A
#   - Reliability: A
#   - Security: A
# 